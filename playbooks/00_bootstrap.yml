- name: Server initialisation
  hosts: all
  become: true
  gather_facts: false

  vars_files:
    - ../group_vars/all/all.yml
    - "../inventories/{{ target_env | default('dev') }}/group_vars/all/secrets.yml"
  pre_tasks:
    - name: Bootstrap Ansible remote directory
      ansible.builtin.raw: mkdir -p ~/.ansible/tmp && chmod 700 ~/.ansible/tmp
      changed_when: false
    - name: Now gather facts safely
      ansible.builtin.setup:
  roles:
    - common
