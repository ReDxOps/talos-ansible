---
- name: Server initialisation
  hosts: all
  become: true
  gather_facts: false
  pre_tasks:
    - name: Bootstrap Ansible remote directory
      ansible.builtin.raw: mkdir -p ~/.ansible/tmp && chmod 700 ~/.ansible/tmp
      changed_when: false
    - name: Now gather facts safely
      ansible.builtin.setup:
  roles:
    - common
