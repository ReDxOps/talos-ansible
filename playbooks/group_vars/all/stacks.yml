# ==============================================================================
# APPLICATIONS & SERVICES DASHBOARD
# ==============================================================================
# Use this file to centrally manage the desired state of all application stacks.
# This file overrides the default states defined within each role.
#
# Available states:
# - present : Stack is deployed and running (Default)
# - stopped : Stack is deployed but containers are stopped (Saves resources)
# - absent  : Stack is removed from the host (Keep data volumes)
# ==============================================================================

