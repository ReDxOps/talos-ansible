---

ansible_user: "{{ target_user }}"
ansible_port: "{{ target_ssh_port }}"
ansible_connection: ssh

target_user: sentinel
target_ssh_port: 8888
target_ssh_pubkey: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

# Docker Configuration
docker_users:
  - "{{ target_user }}"

docker_install_compose_plugin: true

http_port: 80
https_port: 443

traefik_domain: "talos.vm" 

