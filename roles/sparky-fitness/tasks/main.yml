---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ sparkyfitness_root_dir }}"
    - "{{ sparkyfitness_root_dir }}/data"
    - "{{ sparkyfitness_root_dir }}/data/backup"
    - "{{ sparkyfitness_root_dir }}/data/uploads"
    - "{{ sparkyfitness_root_dir }}/db_data"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ sparkyfitness_root_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ sparkyfitness_root_dir }}"
    state: present
    pull: always
