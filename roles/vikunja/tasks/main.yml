---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "0755"
  loop:
    - { path: "{{ vikunja_root_dir }}" }
    - { path: "{{ vikunja_root_dir }}/data", owner: 1000, group: 1000 }
    - { path: "{{ vikunja_root_dir }}/db_data" }

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vikunja_root_dir }}/docker-compose.yml"
    mode: "0644"

- name: Manage docker-compose stack state
  community.docker.docker_compose_v2:
    project_src: "{{ vikunja_root_dir }}"
    state: "{{ vikunja_stack_state }}"
    pull: "{{ 'always' if vikunja_stack_state == 'present' else 'missing' }}"
