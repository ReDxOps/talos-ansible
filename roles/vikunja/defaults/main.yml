---
vikunja_stack_state: "present" # present | stopped | absent
vikunja_app_image: ""
vikunja_app_image_tag: ""
vikunja_postgres_image: ""
vikunja_postgres_image_tag: ""
vikunja_redis_image: ""
vikunja_redis_image_tag: ""

vikunja_db_name: "vikunja_db"
vikunja_db_user: "{{ vault_vikunja_db_user }}"
vikunja_db_password: "{{ vault_vikunja_db_password }}"

vikunja_role_name: "vikunja"
vikunja_root_dir: "{{ project_root_dir }}/{{ vikunja_role_name }}"
vikunja_reverse_proxy_network: "{{ traefik_network }}"
vikunja_web_url: "{{ vikunja_role_name }}.{{ traefik_domain }}"
