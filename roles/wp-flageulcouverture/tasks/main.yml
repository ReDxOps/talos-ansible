---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ wp_flageulcouverture_root_dir }}"
    - "{{ wp_flageulcouverture_root_dir }}/src"
    - "{{ wp_flageulcouverture_root_dir }}/db_data"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ wp_flageulcouverture_root_dir }}/docker-compose.yml"
    mode: '0644'

- name: Manage docker-compose stack state
  community.docker.docker_compose_v2:
    project_src: "{{ wp_flageulcouverture_root_dir }}"
    state: "{{ wp_flageulcouverture_stack_state }}"
    pull: "{{ 'always' if wp_flageulcouverture_stack_state == 'present' else 'missing' }}"
