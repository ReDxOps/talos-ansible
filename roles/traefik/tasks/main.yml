---
- name: Read Crowdsec LAPI key for Traefik
  ansible.builtin.slurp:
    src: /etc/crowdsec/traefik-bouncer.key
  register: traefik_traefik_crowdsec_key_b64
  ignore_errors: true

- name: Set Crowdsec LAPI key fact
  ansible.builtin.set_fact:
    traefik_crowdsec_lapi_key: "{{ traefik_traefik_crowdsec_key_b64.content | b64decode | trim }}"
  when: traefik_traefik_crowdsec_key_b64 is success

- name: Create traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ traefik_root_dir }}/data"
    - "{{ traefik_root_dir }}/logs"

- name: Create traefik acme file
  ansible.builtin.file:
    path: "{{ traefik_root_dir }}/data/acme.json"
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Copy traefik static conf template
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_root_dir }}/traefik.yml"
    mode: "0644"

- name: Copy traefik dynamic conf template
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ traefik_root_dir }}/dynamic.yml"
    mode: "0644"

- name: Copy traefik docker compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_root_dir }}/docker-compose.yml"
    mode: "0644"

- name: Create docker network
  community.docker.docker_network:
    name: "{{ traefik_reverse_proxy_network }}"
    state: present

- name: Manage traefik compose stack state
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_root_dir }}"
    state: "{{ traefik_stack_state }}"
    pull: "{{ 'always' if traefik_stack_state == 'present' else 'missing' }}"
