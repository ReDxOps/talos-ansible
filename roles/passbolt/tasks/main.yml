---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
  loop:
    - { path: "{{ passbolt_root_dir }}" }
    - { path: "{{ passbolt_root_dir }}/db_data" }
    - { path: "{{ passbolt_root_dir }}/gpg_volume", owner: 33, group: 33 }
    - { path: "{{ passbolt_root_dir }}/jwt_volume", owner: 33, group: 33 }

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ passbolt_root_dir }}/docker-compose.yml"
    mode: '0644'

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ passbolt_root_dir }}"
    state: present
    pull: always

- name: Wait for Passbolt to be fully initialized (DB migrations)
  ansible.builtin.command:
    cmd: "docker exec passbolt ./bin/cake passbolt healthcheck --json"
  register: passbolt_healthcheck_result
  until: >
    'true' in passbolt_healthcheck_result.stdout and
    'databaseConnect' in passbolt_healthcheck_result.stdout and
    '"databaseConnect":true' in passbolt_healthcheck_result.stdout
  retries: 30
  delay: 10
  changed_when: false
  failed_when: false

- name: Check if admin user exists
  ansible.builtin.command:
    cmd: "docker exec passbolt ./bin/cake passbolt users_index"
  register: passbolt_users_list
  changed_when: false
  failed_when: false

- name: Auto-bootstrap first admin
  ansible.builtin.command:
    cmd: >
      docker exec passbolt
      ./bin/cake passbolt register_user
      -u {{ passbolt_admin_email }}
      -f {{ passbolt_admin_first_name }}
      -l {{ passbolt_admin_last_name }}
      -r admin
  when: passbolt_admin_email not in passbolt_users_list.stdout
  register: passbolt_bootstrap_output
  changed_when: true
  notify: Display Registration Link
