---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0755"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
  loop:
    - { path: "{{ passbolt_root_dir }}" }
    - { path: "{{ passbolt_root_dir }}/db_data" }
    - { path: "{{ passbolt_root_dir }}/gpg_volume", owner: 33, group: 33 }
    - { path: "{{ passbolt_root_dir }}/jwt_volume", owner: 33, group: 33 }

- name: Anti-lock - Remove corrupted MariaDB tc.log
  ansible.builtin.file:
    path: "{{ passbolt_root_dir }}/db_data/tc.log"
    state: absent

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ passbolt_root_dir }}/docker-compose.yml"
    mode: "0644"

- name: Manage docker-compose stack state
  community.docker.docker_compose_v2:
    project_src: "{{ passbolt_root_dir }}"
    state: "{{ passbolt_stack_state }}"
    pull: "{{ 'always' if passbolt_stack_state == 'present' else 'never' }}"

- name: Check if Passbolt is already initialized
  ansible.builtin.command: "docker compose exec -T app ls /etc/passbolt/gpg/serverkey.asc"
  args:
    chdir: "{{ passbolt_root_dir }}"
  register: passbolt_init_file
  failed_when: false
  changed_when: false

- name: Wait for MariaDB to be ready
  ansible.builtin.command:
    cmd: "docker compose exec -T app ./bin/cake passbolt healthcheck --json"
    chdir: "{{ passbolt_root_dir }}"
  register: passbolt_db_check
  until: >
    '"databaseConnect":true' in passbolt_db_check.stdout
  retries: 20
  delay: 5
  changed_when: false

- name: Check if admin user exists
  ansible.builtin.command:
    cmd: "docker compose exec -T app ./bin/cake passbolt users_index"
    chdir: "{{ passbolt_root_dir }}"
  register: passbolt_users_list
  changed_when: false
  failed_when: false

- name: Auto-bootstrap first admin
  ansible.builtin.command:
    cmd: >
      docker compose exec -T app ./bin/cake passbolt register_user -u {{ passbolt_admin_email }} -f {{ passbolt_admin_first_name }} -l {{
      passbolt_admin_last_name }} -r admin
    chdir: "{{ passbolt_root_dir }}"
  when: passbolt_admin_email not in passbolt_users_list.stdout
  register: passbolt_bootstrap_output
  changed_when: true
  notify: Display Registration Link
