---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "/opt/talos/wp-3lbshop"
    - "/opt/talos/wp-3lbshop/src"
    - "/opt/talos/wp-3lbshop/config"
    - "/opt/talos/wp-3lbshop/db_data"

- name: Copy docker-compose and php.ini template
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: docker-compose.yml.j2, dest: "/opt/talos/wp-3lbshop/docker-compose.yml" }
    - { src: php.ini.j2, dest: "/opt/talos/wp-3lbshop/config/php.ini" }

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "/opt/talos/wp-3lbshop"
    state: present
    pull: always
