---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ wp_3lbshop_root_dir }}"
    - "{{ wp_3lbshop_root_dir }}/src"
    - "{{ wp_3lbshop_root_dir }}/config"
    - "{{ wp_3lbshop_root_dir }}/db_data"

- name: Copy docker-compose and php.ini template
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: docker-compose.yml.j2, dest: "{{ wp_3lbshop_root_dir }}/docker-compose.yml" }
    - { src: php.ini.j2, dest: "{{ wp_3lbshop_root_dir }}/config/php.ini" }

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ wp_3lbshop_root_dir }}"
    state: present
    pull: always
