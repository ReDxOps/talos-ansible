---

- name: Install ufw package
  ansible.builtin.package:
    name: ufw
    state: present

- name: Configure default policy
  community.general.ufw:
    default: deny
    direction: incoming

- name: Allow everything on Loopback
  community.general.ufw:
    rule: allow
    interface: lo
    direction: in

- name: Open SSH + WEB ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.protocol | default('tcp') }}"
  loop:
    - { port: "{{ common_http_port }}" }
    - { port: "{{ common_https_port }}" }
    - { port: "{{ tailscale_p2p_port }}", protocol: "udp" }

- name: Open SSH on Tailscale interface ONLY
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in
    port: "{{ common_target_ssh_port }}"
    proto: tcp

- name: Allow SSH on private Vagrant network (DEV ONLY)
  community.general.ufw:
    rule: allow
    src: 192.168.100.0/24
    port: "{{ common_target_ssh_port }}"
    proto: tcp
  when: target_env | default('dev') == 'dev'

- name: Set enable UFW
  community.general.ufw:
    state: enabled
