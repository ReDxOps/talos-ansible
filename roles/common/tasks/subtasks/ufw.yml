---

- name: Install ufw package
  ansible.builtin.package:
    name: ufw
    state: present

- name: Configure default policy
  community.general.ufw:
    default: deny
    direction: incoming

- name: Allow everything on Loopback
  community.general.ufw:
    rule: allow
    interface: lo
    direction: in

- name: Open SSH + WEB ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ common_target_ssh_port }}"
    - "{{ common_http_port }}"
    - "{{ common_https_port }}"

- name: Set enable UFW
  community.general.ufw:
    state: enabled
