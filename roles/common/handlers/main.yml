---
- name: Restart ssh
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: Restart Network
  ansible.builtin.shell: |
    if systemctl list-unit-files | grep -q "^networking.service"; then
      systemctl restart networking
    elif systemctl list-unit-files | grep -q "^systemd-networkd.service"; then
      systemctl restart systemd-networkd
    else
      echo "No networking service found, skipping"
    fi
  when: ansible_virtualization_type != 'docker'
  changed_when: true

- name: Create Crowdsec enrollment marker
  ansible.builtin.file:
    path: /etc/crowdsec/console-enrolled
    state: touch
    mode: "0644"

- name: Restart Crowdsec
  ansible.builtin.service:
    name: crowdsec
    state: restarted
