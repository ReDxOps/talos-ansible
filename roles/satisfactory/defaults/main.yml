---
satisfactory_stack_state: "present" # present | stopped | absent
satisfactory_app_image: ""
satisfactory_app_image_tag: ""

satisfactory_memory_limit: "8G"
satisfactory_memory_reservation: "1G"

satisfactory_server_maxplayers: "32"

satisfactory_game_port: 7777
satisfactory_messaging_port: 8889

satisfactory_role_name: "satisfactory"
satisfactory_root_dir: "{{ project_root_dir }}/{{ satisfactory_role_name }}"
