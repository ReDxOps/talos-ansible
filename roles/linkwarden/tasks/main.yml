---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ linkwarden_root_dir }}"
    - "{{ linkwarden_root_dir }}/data"
    - "{{ linkwarden_root_dir }}/db_data"
    - "{{ linkwarden_root_dir }}/meili_data"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ linkwarden_root_dir }}/docker-compose.yml"
    mode: '0644'

- name: Manage docker-compose stack state
  community.docker.docker_compose_v2:
    project_src: "{{ linkwarden_root_dir }}"
    state: "{{ linkwarden_stack_state }}"
    pull: "{{ 'always' if linkwarden_stack_state == 'present' else 'never' }}"
