---
- name: Create portainer data directory
  ansible.builtin.file:
    path: "{{ portainer_root_dir }}/data"
    state: directory
    mode: '0755'

- name: Copy portainer docker compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ portainer_root_dir }}/docker-compose.yml"
    mode: '0644'

- name: Manage docker-compose stack state
  community.docker.docker_compose_v2:
    project_src: "{{ portainer_root_dir }}"
    state: "{{ portainer_stack_state }}"
    pull: "{{ 'always' if portainer_stack_state == 'present' else 'missing' }}"
