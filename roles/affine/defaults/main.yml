---
affine_stack_state: "present" # present | stopped | absent

affine_app_image: ""
affine_app_image_tag: ""

affine_postgres_image: ""
affine_postgres_image_tag: ""

affine_redis_image: ""
affine_redis_image_tag: ""

affine_role_name: "affine"
affine_root_dir: "{{ project_root_dir }}/{{ affine_role_name }}"
affine_reverse_proxy_network: "{{ traefik_network }}"
affine_web_url: "{{ affine_role_name }}.{{ traefik_domain_deadcable }}"

affine_db_name: "affine_db"
affine_database_url: "postgresql://{{ affine_db_user }}:{{ affine_db_password }}@db:5432/{{ affine_db_name }}"
affine_db_user: "{{ vault_affine_db_user }}"
affine_db_password: "{{ vault_affine_db_password }}"
