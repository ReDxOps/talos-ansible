---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"
  loop:
    - "{{ ark_root_dir }}"
    - "{{ ark_root_dir }}/{{ ark_fjordur_name }}"
    - "{{ ark_root_dir }}/{{ ark_fjordur_backup_directory_name }}"
    - "{{ ark_root_dir }}/{{ ark_cluster_directory }}"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ark_root_dir }}/docker-compose.yml"
    mode: "0644"
  register: compose_file_status

- name: Check GameUserSettings.ini
  community.general.ini_file:
    path: "{{ ark_fjordur_config_path }}/GameUserSettings.ini"
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: "1000"
    group: "1000"
    mode: "0644"
    create: true
  loop: "{{ ark_game_user_settings }}"
  check_mode: true
  register: game_user_settings_status
  notify: Modify GameUserSettings.ini

- name: Check Game.ini
  community.general.ini_file:
    path: "{{ ark_fjordur_config_path }}/Game.ini"
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: "1000"
    group: "1000"
    mode: "0644"
    create: true
  loop: "{{ ark_game_settings }}"
  check_mode: true
  register: game_settings_status
  notify: Modify Game.ini

- name: Check Custom Loots in Game.ini (blockinfile)
  ansible.builtin.blockinfile:
    path: "{{ ark_fjordur_config_path }}/Game.ini"
    marker: "; {mark} ANSIBLE MANAGED LOOT DROPS"
    block: "{{ ark_custom_loots }}"
    owner: "1000"
    group: "1000"
    mode: "0644"
    create: true
  check_mode: true
  register: game_loots_status
  notify: Modify Custom Loots in Game.ini (blockinfile)

- name: Stop application stack
  community.docker.docker_compose_v2:
    project_src: "{{ ark_root_dir }}"
    state: stopped
  when: compose_file_status.changed or game_user_settings_status.changed or game_settings_status.changed or game_loots_status.changed

- name: Flush handlers to apply config while server is stopped
  ansible.builtin.meta: flush_handlers

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ ark_root_dir }}"
    state: present
    pull: always
