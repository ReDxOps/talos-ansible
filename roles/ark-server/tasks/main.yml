---

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"
  loop:
    - "{{ ark_root_dir }}"
    - "{{ ark_root_dir }}/{{ ark_fjordur_name }}"
    - "{{ ark_root_dir }}/{{ ark_fjordur_backup_directory_name }}"
    - "{{ ark_root_dir }}/{{ ark_cluster_directory }}"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ark_root_dir }}/docker-compose.yml"
    mode: "0644"
  register: compose_file_status

- name: Track desired configuration state
  ansible.builtin.copy:
    content: "{{ {'user_settings': ark_game_user_settings, 'game_settings': ark_game_settings, 'custom_loots': ark_custom_loots} | to_nice_json }}"
    dest: "{{ ark_root_dir }}/.ark_config_state.json"
    owner: "1000"
    group: "1000"
    mode: "0644"
  register: ark_config_state
  notify:
    - Modify GameUserSettings.ini
    - Modify Game.ini
    - Modify Custom Loots in Game.ini (blockinfile)

- name: Stop application stack
  community.docker.docker_compose_v2:
    project_src: "{{ ark_root_dir }}"
    state: stopped
  when: compose_file_status.changed or ark_config_state.changed

- name: Flush handlers to apply config while server is stopped
  ansible.builtin.meta: flush_handlers

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ ark_root_dir }}"
    state: present
    pull: always
