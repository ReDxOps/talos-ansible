---

- name: Create data directories with specific permissions
  ansible.builtin.file:
    path: "/opt/talos/observability/data/{{ item.name }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: '0755'
  loop:
    - { name: 'prometheus', owner: '65534', group: '65534' }
    - { name: 'grafana', owner: '472', group: '0' }
    - { name: 'loki', owner: '10001', group: '10001' }
    - { name: 'alertmanager', owner: '65534', group: '65534' }

- name: Create configuration and provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: '472'
    group: '0'
    mode: '0755'
  loop:
    - /opt/talos/observability/config/prometheus
    - /opt/talos/observability/config/loki
    - /opt/talos/observability/config/promtail
    - /opt/talos/observability/config/alertmanager
    - /opt/talos/observability/config/grafana/provisioning/datasources
    - /opt/talos/observability/config/grafana/provisioning/dashboards/json

- name: Copy configuration templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: 'prometheus.yml.j2', dest: '/opt/talos/observability/config/prometheus/prometheus.yml' }
    - { src: 'loki-config.yml.j2', dest: '/opt/talos/observability/config/loki/loki-config.yml' }
    - { src: 'promtail-config.yml.j2', dest: '/opt/talos/observability/config/promtail/promtail-config.yml' }
    - { src: 'alerts.yml.j2', dest: '/opt/talos/observability/config/prometheus/alerts.yml' }
    - { src: 'alertmanager.yml.j2', dest: '/opt/talos/observability/config/alertmanager/alertmanager.yml' }
    - { src: 'datasources.yml.j2', dest: '/opt/talos/observability/config/grafana/provisioning/datasources/datasources.yml' }
    - { src: 'dashboards.yml.j2', dest: '/opt/talos/observability/config/grafana/provisioning/dashboards/dashboards.yml' }
    - { src: 'docker-compose.yml.j2', dest: '/opt/talos/observability/docker-compose.yml' }

- name: Download external dashboards from Grafana API
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "/opt/talos/observability/config/grafana/provisioning/dashboards/json/{{ item.dest }}"
    mode: '0644'
    owner: '472'
  loop:
    - { url: "https://grafana.com/api/dashboards/1860/revisions/latest/download", dest: "dashboard-1860.json" }
    - { url: "https://grafana.com/api/dashboards/11462/revisions/latest/download", dest: "traefik-dashboard.json" }

- name: Fix Prometheus datasource variable in downloaded dashboards
  ansible.builtin.replace:
    path: "/opt/talos/observability/config/grafana/provisioning/dashboards/json/{{ item }}"
    regexp: '\$\{DS_PROMETHEUS\}'
    replace: 'Prometheus'
  loop:
    - dashboard-1860.json
    - traefik-dashboard.json
  ignore_errors: true

- name: Copy local dashboard files
  ansible.builtin.copy:
    src: "dashboards/{{ item }}"
    dest: "/opt/talos/observability/config/grafana/provisioning/dashboards/json/{{ item }}"
    mode: '0644'
    owner: '472'
  loop:
    - docker-dashboard.json
    - docker-logs-dashboard.json

- name: Start observability stack
  community.docker.docker_compose_v2:
    project_src: /opt/talos/observability
    pull: always
    state: present
