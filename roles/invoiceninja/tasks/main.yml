---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ invoiceninja_root_dir }}"
    - "{{ invoiceninja_root_dir }}/app_public"
    - "{{ invoiceninja_root_dir }}/app_storage"
    - "{{ invoiceninja_root_dir }}/db_data"
    - "{{ invoiceninja_root_dir }}/files"
    - "{{ invoiceninja_root_dir }}/nginx"

- name: Copy modified php application files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: Account.php, dest: "{{ invoiceninja_root_dir }}/files/Account.php" }
    - { src: Ninja.php, dest: "{{ invoiceninja_root_dir }}/files/Ninja.php" }

- name: Copy Nginx configuration files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ invoiceninja_root_dir }}/nginx/{{ item }}"
    mode: "0644"
  loop:
    - invoiceninja.conf
    - laravel.conf

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ invoiceninja_root_dir }}/docker-compose.yml"
    mode: "0644"

- name: Copy .env template
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ invoiceninja_root_dir }}/.env"
    mode: "0600"

- name: Start docker-compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ invoiceninja_root_dir }}"
    state: present
    pull: always
