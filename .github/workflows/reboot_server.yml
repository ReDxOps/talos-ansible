name: Reboot Server
run-name: Forced reboot of talos-srv executed by Ansible

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  ANSIBLE_BIN_PATH: /opt/talos/ansible-venv/bin

jobs:
  reboot_talos_srv:
    name: Reboot the server
    runs-on: [self-hosted, prod]
    environment: talos-srv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Dependencies
        run: $ANSIBLE_BIN_PATH/ansible-galaxy install -r requirements.yml --force

      - name: Run Reboot
        run: $ANSIBLE_BIN_PATH/ansible-playbook playbooks/05_maintenance.yml --tags reboot -e "maintenance_force_reboot=true maintenance_with_cicd=true" -i inventories/prod/hosts.yml --connection=local --vault-id prod@/home/github-runner/.vault_pass_prod

  wait_server_reboot:
    name: Wait for the server to reboot
    runs-on: ubuntu-24.04
    needs: reboot_talos_srv

    steps:
      - name: Waiting 5 minutes
        run: sleep 300

  verify_server_health:
    name: Verify if server and Docker containers are healthy
    runs-on: [self-hosted, prod]
    needs: wait_server_reboot

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Dependencies
        run: $ANSIBLE_BIN_PATH/ansible-galaxy install -r requirements.yml --force

      - name: Run Healthcheck
        run: $ANSIBLE_BIN_PATH/ansible-playbook playbooks/05_maintenance.yml --tags healthcheck -i inventories/prod/hosts.yml --connection=local --vault-id prod@/home/github-runner/.vault_pass_prod
